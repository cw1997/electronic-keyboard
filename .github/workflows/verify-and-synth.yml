name: Verify and Synthesize

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  sim:
    name: Simulation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install simulation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog verilator

      - name: Run testbench (iverilog)
        run: make -C sim sim

      - name: Run Verilator lint
        run: make -C sim lint

      - name: Upload simulation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sim-results
          path: |
            sim/build/
            sim/*.vcd
          retention-days: 14
          if-no-files-found: warn

  librelane:
    name: LibreLane Synthesis
    runs-on: ubuntu-latest
    needs: sim
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install LibreLane
        run: python3 -m pip install librelane

      - name: Run LibreLane flow
        working-directory: syn/librelane
        run: script -q -e -c "bash build.sh" /dev/null

      - name: Upload LibreLane run artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: librelane-runs
          path: syn/librelane/runs/
          retention-days: 14
          if-no-files-found: warn

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [sim, librelane]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write
    steps:
      - name: Download simulation artifacts
        uses: actions/download-artifact@v8
        with:
          name: sim-results
          path: sim-results/

      - name: Download LibreLane run artifacts
        uses: actions/download-artifact@v8
        with:
          name: librelane-runs
          path: syn/librelane/runs/

      - name: Package release archives
        env:
          GIT_HASH: ${{ github.sha }}
        run: |
          TAG_NAME="build_$(date +%Y%m%d%H%M%S)_${GIT_HASH:0:8}"
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"
          (cd sim-results && zip -r "$GITHUB_WORKSPACE/sim-result.zip" .)
          (cd syn/librelane/runs && zip -r "$GITHUB_WORKSPACE/librelane-build.zip" .)

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.TAG_NAME }}
          body: |
            Automated build from commit ${{ github.sha }}

            - sim-result.zip: simulation artifacts (iverilog build, VCD waveforms)
            - librelane-build.zip: LibreLane synthesis run outputs
          files: |
            sim-result.zip
            librelane-build.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
